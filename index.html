<!doctype html>
<html lang="en">
  <head>
    <script>
      // Force kill aggressive PWA Service Worker caching
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then(function (registrations) {
            for (let registration of registrations) {
              registration.unregister();
              console.log("ServiceWorker unregistered successfully.");
              // Only reload once if we just killed a SW
              if (!sessionStorage.getItem("sw_killed")) {
                sessionStorage.setItem("sw_killed", "true");
                window.location.reload(true);
              }
            }
          });
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts for Pixel Art Hero Text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- SEO Optimization -->
    <title>RobuxMinerPro: Safe, official ways to get Robux</title>
    <meta
      name="description"
      content="Learn safe, official ways to get Robux with RobuxMinerPro. Guides, tips, and tools that follow Roblox rules."
    />
    <meta name="author" content="RobuxMinerPro" />
    <link rel="canonical" href="https://www.robuxminer.pro/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "RobuxMinerPro",
        "url": "https://www.robuxminer.pro/",
        "logo": "https://www.robuxminer.pro/assets/official_logo.svg"

    <!-- Open Graph -->

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="api-base" content="https://API_BASE_PLACEHOLDER" />
  </head>
