name: RobuxMinerPro Agent Deploy

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "cloudflare/worker/**"

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno lint supabase/functions/
      - run: deno check supabase/functions/**/index.ts

  deploy-migrations:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'supabase/migrations/')
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - run: supabase db push --linked
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-edge-functions:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - run: |
          supabase functions deploy agent-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy extract-memories --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy embed-knowledge --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-cloudflare-worker:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: cloudflare/worker
      - run: npx wrangler deploy
        working-directory: cloudflare/worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
